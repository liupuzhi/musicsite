<style>
  :root {
    --bg:       #0c0c0e;
    --surface:  #141416;

    --gold:     #c8a96e;
    --gold-dim: #7a6440;

    pointer-events: none;

  /* ══════════ JOIN SCREEN ══════════ */

  .join-card {

  }

  .join-title {

  }
  .join-sub {
    color: var(--text-dim);

    font-family: 'DM Mono', monospace;

  }

  .divider {
    width: 48px;

    background: var(--gold-dim);

  }

  .join-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;

  .join-input {

  }

  .join-input::placeholder { color: var(--text-dim); letter-spacing: 0.08em; font-size: 0.85rem; }

  .btn-row { display: flex; gap: 12px; }

  .btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Mono', monospace;

  /* ══════════ PLAYER SCREEN ══════════ */

    display: none;
    flex-direction: column;

  }

  /* Ambient glow behind cover */
  .ambient {

    width: 500px;

  .sync-dot {

  /* Progress bar */

    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;

  }
  .progress-bar {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    transition: height 0.15s;
  }
  .progress-bar:hover { height: 5px; }
  .progress-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 2px;

  }
  .progress-fill::after {
    content: '';
    position: absolute;
    right: -4px; top: 50%;
    transform: translateY(-50%);

    border-radius: 50%;
    background: var(--gold);
    opacity: 0;
    transition: opacity 0.15s;

  .progress-bar:hover .progress-fill::after { opacity: 1; }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 28px;

  .ctrl-btn {
    background: none;

    color: var(--text-dim);

  .play-btn:hover:not(:disabled) { background: #d4b87a; transform: scale(1.05); box-shadow: 0 0 32px rgba(200,169,110,0.4); }
  .play-btn svg { width: 22px; height: 22px; }

  /* Volume */
  .volume-section {

  }

  .vol-icon svg { width: 16px; height: 16px; }
  input[type=range] {

    width: 90px;

    background: var(--border);

    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;

  /* Guest overlay */
  .guest-overlay {
    position: absolute;

  /* Toast */
  .toast {
    position: fixed;

    border: 1px solid var(--border);
    color: var(--text);

    opacity: 0;

    white-space: nowrap;

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Responsive */
  @media (max-width: 640px) {
    .sidebar { display: none; }
    .main { padding: 24px 20px; }

  }

  /* Loading screen */
  #loading-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);

    align-items: center;
    justify-content: center;
    z-index: 20;

  #loading-screen.hidden { opacity: 0; pointer-events: none; }
  .loader-text {
    font-family: 'Lora', serif;
    font-style: italic;

    font-size: 1rem;

  }
  @keyframes breathe {
    0%, 100% { opacity: 0.4; }

</style>

<!-- Firebase SDK (compat version — easier to use) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ════════════════════════════════════════
//  App State
// ════════════════════════════════════════
let db, roomRef;
let isHost = false;
let currentTrack = 0;
let roomCode = '';
let isSyncing = false;  // prevent feedback loop
let lastSyncedTime = 0;

const audio = document.getElementById('audio');

// ════════════════════════════════════════
//  Firebase Init
// ════════════════════════════════════════
function initFirebase() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    document.getElementById('loading-screen').classList.add('hidden');
  } catch (e) {
    document.querySelector('.loader-text').textContent = '配置错误，请检查 Firebase 设置';
    console.error(e);
  }
}

// ════════════════════════════════════════
//  Room Logic
// ════════════════════════════════════════
function generateCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length: 4}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}

function createRoom() {
  const code = generateCode();
  enterRoom(code, true);
}

function joinRoom() {
  const val = document.getElementById('room-input').value.trim().toUpperCase();
  if (!val) { showToast('请输入房间代码'); return; }
  enterRoom(val, false);
}

function enterRoom(code, asHost) {
  roomCode = code;
  isHost = asHost;

  document.getElementById('join-screen').classList.add('hidden');
  document.getElementById('player-screen').classList.add('visible');
  document.getElementById('room-display').textContent = 'ROOM · ' + code;

  const badge = document.getElementById('role-badge');
  if (isHost) {
    badge.textContent = 'HOST';
    badge.className = 'role-badge role-host';
  } else {
    badge.textContent = 'LISTENER';
    badge.className = 'role-badge role-guest';
  }

  // Disable controls for guest
  if (!isHost) {
    ['btn-prev','btn-play','btn-next','progress-bar'].forEach(id => {
      const el = document.getElementById(id);
      if (el.tagName === 'BUTTON') el.disabled = true;
      else el.style.pointerEvents = 'none';
    });
  }

  renderPlaylist();
  setupSync();

  if (isHost) {
    loadTrack(0, false);
    showToast('房间已创建 · ' + code + ' · 告诉对方这个代码');
  } else {
    showToast('已加入房间 · ' + code);
  }
}

// ════════════════════════════════════════
//  Firebase Sync
// ════════════════════════════════════════
function setupSync() {
  roomRef = db.ref('rooms/' + roomCode + '/state');

  // Host pushes state; Guest listens
  if (!isHost) {
    roomRef.on('value', snap => {
      const state = snap.val();
      if (!state) return;
      syncFromState(state);
    });
  }

  // Both sides show connection status
  db.ref('.info/connected').on('value', snap => {
    const connected = snap.val();
    const dot = document.getElementById('sync-dot');
    const label = document.getElementById('sync-label');
    dot.className = 'sync-dot' + (connected ? ' synced' : '');
    label.textContent = connected ? '已连接' : '断线中';
  });
}

function pushState() {
  if (!isHost || !roomRef) return;
  roomRef.set({
    trackIndex: currentTrack,
    playing: !audio.paused,
    currentTime: audio.currentTime,
    updatedAt: Date.now()
  });
}

function syncFromState(state) {
  isSyncing = true;

  // Sync track
  if (state.trackIndex !== currentTrack) {
    loadTrack(state.trackIndex, false);
  }

  // Compensate for network delay
  const lag = (Date.now() - state.updatedAt) / 1000;
  const targetTime = state.currentTime + lag;

  // Only seek if drift > 1.5s
  if (Math.abs(audio.currentTime - targetTime) > 1.5) {
    audio.currentTime = targetTime;
  }

  // Sync play/pause
  if (state.playing && audio.paused) {
    audio.play().catch(() => {});
  } else if (!state.playing && !audio.paused) {
    audio.pause();
  }

  updatePlayUI(!audio.paused);
  isSyncing = false;
}

// ════════════════════════════════════════
//  Player Logic
// ════════════════════════════════════════
function loadTrack(index, autoPlay = true) {
  if (index < 0 || index >= PLAYLIST.length) return;
  currentTrack = index;
  const t = PLAYLIST[index];

  audio.src = t.url;
  audio.load();

  document.getElementById('track-title').textContent = t.title;
  document.getElementById('track-artist').textContent = t.artist;
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('time-cur').textContent = '0:00';
  document.getElementById('time-total').textContent = '0:00';

  // Cover art
  const coverArea = document.getElementById('cover-area');
  if (t.cover) {
    coverArea.innerHTML = `<img src="${t.cover}" alt="${t.title}" onerror="this.parentElement.innerHTML='<div class=\\'cover-placeholder\\'><span class=\\'note-icon\\'>♪</span></div>'">`;
  } else {
    coverArea.innerHTML = '<div class="cover-placeholder"><span class="note-icon">♪</span></div>';
  }

  // Highlight in playlist
  document.querySelectorAll('.track-item').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });

  if (autoPlay) {
    audio.play().then(() => {
      updatePlayUI(true);
      pushState();
    }).catch(() => {});
  }
}

function togglePlay() {
  if (!isHost) return;
  if (audio.paused) {
    if (!audio.src) { loadTrack(0); return; }
    audio.play().then(() => { updatePlayUI(true); pushState(); }).catch(() => {});
  } else {
    audio.pause();
    updatePlayUI(false);
    pushState();
  }
}

function nextTrack() {
  if (!isHost) return;
  const next = (currentTrack + 1) % PLAYLIST.length;
  loadTrack(next, true);
  pushState();
}

function prevTrack() {
  if (!isHost) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; pushState(); return; }
  const prev = (currentTrack - 1 + PLAYLIST.length) % PLAYLIST.length;
  loadTrack(prev, true);
  pushState();
}

function seekTo(e) {
  if (!isHost) return;
  const bar = document.getElementById('progress-bar');
  const rect = bar.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audio.currentTime = ratio * audio.duration;
  pushState();
}

function setVolume(v) {
  audio.volume = v;
}

function updatePlayUI(playing) {
  document.getElementById('icon-play').style.display = playing ? 'none' : 'block';
  document.getElementById('icon-pause').style.display = playing ? 'block' : 'none';
}

// ── Audio events ──
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('time-cur').textContent = fmt(audio.currentTime);

  // Host pushes sync every 5 seconds
  if (isHost && !isSyncing && Math.floor(audio.currentTime) % 5 === 0 &&
      Math.floor(audio.currentTime) !== lastSyncedTime) {
    lastSyncedTime = Math.floor(audio.currentTime);
    pushState();
  }
});

audio.addEventListener('loadedmetadata', () => {
  document.getElementById('time-total').textContent = fmt(audio.duration);
});

audio.addEventListener('ended', () => {
  if (isHost) nextTrack();
});

audio.addEventListener('play', () => updatePlayUI(true));
audio.addEventListener('pause', () => updatePlayUI(false));

function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

// ════════════════════════════════════════
//  Playlist Render
// ════════════════════════════════════════
function renderPlaylist() {
  const container = document.getElementById('playlist');
  container.innerHTML = '';
  PLAYLIST.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'track-item' + (i === currentTrack ? ' active' : '');
    div.innerHTML = `<div class="track-name">${t.title}</div><div class="track-artist">${t.artist}</div>`;
    if (isHost) div.onclick = () => { loadTrack(i, true); pushState(); };
    container.appendChild(div);
  });
}

// ════════════════════════════════════════
//  Toast
// ════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ════════════════════════════════════════
//  Keyboard shortcuts (Host only)
// ════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (!isHost) return;
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') nextTrack();
  if (e.code === 'ArrowLeft') prevTrack();
});

// Enter key in room input
document.getElementById('room-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinRoom();
});

// ════════════════════════════════════════
//  Boot
// ════════════════════════════════════════
window.addEventListener('load', initFirebase);
</script>
